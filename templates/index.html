<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proventos</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#16213e" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Proventos" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      color: #e2e8f0;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: space-between;
    }
    header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: .02em; }
    header span { font-size: .85rem; color: #94a3b8; }

    main { max-width: min(1800px, calc(100vw - 3rem)); margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Form card ─────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #334155; }

    .form-row { display: flex; gap: .75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    .form-group label { font-size: .8rem; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
    .form-group input, .form-group select {
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: .45rem .75rem;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #6366f1; }
    .form-group input[type="text"] { width: 130px; text-transform: uppercase; }
    .form-group input[type="number"] { width: 110px; }

    .btn {
      border: none; border-radius: 6px; padding: .48rem 1rem;
      font-size: .88rem; font-weight: 500; cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-add    { background: #6366f1; color: #fff; }
    .btn-add:hover    { background: #4f46e5; }
    .btn-search { background: #0f172a; color: #fff; padding: .55rem 1.4rem; font-size: .95rem; }
    .btn-search:hover { background: #1e293b; }
    .btn-search:disabled { opacity: .5; cursor: not-allowed; }
    .btn-remove { background: none; border: none; color: #94a3b8; font-size: 1.1rem; cursor: pointer; padding: 0 .25rem; }
    .btn-remove:hover { color: #ef4444; }

    /* ── Ticker chips ─────────────────────────────── */
    #ticker-list { display: flex; flex-wrap: wrap; gap: .5rem; min-height: 2rem; }
    .chip {
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 20px; padding: .3rem .75rem;
      font-size: .85rem; display: flex; align-items: center; gap: .4rem;
    }
    .chip.from-config { background: #eff6ff; border-color: #bfdbfe; }
    .chip .ticker-label { font-weight: 600; color: #334155; }
    .chip .qtd-label    { color: #64748b; font-size: .8rem; }
    .chip .config-dot   { width: 6px; height: 6px; border-radius: 50%; background: #6366f1; flex-shrink: 0; }

    /* ── Config summary bar (shown when config loaded & panel collapsed) ── */
    #config-summary {
      display: none;
      align-items: center; gap: .6rem; flex-wrap: wrap;
      margin-bottom: .75rem;
      padding: .5rem .75rem;
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
      font-size: .85rem; color: #334155;
    }
    #config-summary .summary-chips { display: flex; flex-wrap: wrap; gap: .35rem; flex: 1; }
    #config-summary .summary-chip {
      background: #dbeafe; border-radius: 12px; padding: .15rem .55rem;
      font-size: .78rem; font-weight: 600; color: #1e40af;
    }
    #btn-edit-list {
      background: none; border: 1px solid #94a3b8; border-radius: 6px;
      color: #64748b; font-size: .8rem; padding: .25rem .6rem;
      cursor: pointer; white-space: nowrap; transition: background .15s, color .15s;
    }
    #btn-edit-list:hover { background: #f1f5f9; color: #334155; }

    /* ── Cache badge ──────────────────────────────── */
    .cache-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .75rem; color: #64748b;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: .1rem .5rem;
      white-space: nowrap;
    }
    .cache-badge.live { background: #dcfce7; border-color: #86efac; color: #166534; }

    /* ── Collapsible ticker editor panel ─────────── */
    #ticker-editor {
      overflow: hidden;
      transition: max-height .3s ease, opacity .3s ease;
      max-height: 0; opacity: 0;
    }
    #ticker-editor.open { max-height: 600px; opacity: 1; }

    /* ── Status / error ───────────────────────────── */
    #status { font-size: .88rem; color: #64748b; min-height: 1.5rem; }
    .error-box {
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 8px; padding: .75rem 1rem;
      font-size: .88rem; color: #b91c1c; margin-bottom: 1rem;
    }
    .warn-box {
      background: #fffbeb; border: 1px solid #fcd34d;
      border-radius: 8px; padding: .75rem 1rem;
      font-size: .88rem; color: #92400e; margin-bottom: 1rem;
    }

    /* ── Results ──────────────────────────────────── */
    #results { }
    .result-section { margin-bottom: 2rem; }
    .result-title {
      font-size: 1rem; font-weight: 600; color: #334155;
      margin-bottom: .75rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .badge {
      font-size: .72rem; font-weight: 600; border-radius: 4px;
      padding: .15rem .4rem; text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-fii  { background: #dbeafe; color: #1d4ed8; }
    .badge-acao { background: #dcfce7; color: #166534; }

    /* ── Table base ───────────────────────────────── */
    .tbl-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    table { border-collapse: collapse; width: 100%; font-size: .84rem; background: #fff; }
    th {
      background: #1e293b; color: #e2e8f0;
      padding: .55rem .8rem; text-align: left; font-weight: 500;
    }
    td { padding: .45rem .8rem; border-bottom: 1px solid #f1f5f9; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .subtotal-row td { color: #64748b; font-style: italic; background: #fafafa; }
    .subtotal-row td:first-child { padding-left: 2rem; }
    .month-total-row td { font-weight: 600; background: #f8fafc; }

    .total-row td {
      background: #1e293b; color: #f1f5f9;
      font-weight: 600; border-bottom: none;
    }
    .total-label-row td {
      background: #0f172a; color: #94a3b8;
      font-size: .8rem; border-bottom: 1px solid #334155;
    }

    /* empty month */
    .empty-month td { color: #cbd5e1; }

    /* ── Matrix table ─────────────────────────────── */
    /* table-layout:fixed distributes width proportionally across the viewport */
    .matrix-table { table-layout: fixed; }
    .matrix-table th:first-child,
    .matrix-table td:first-child  { text-align: left; width: 14%; min-width: 120px; }
    .matrix-table th:last-child,
    .matrix-table td:last-child   { width: 7%; min-width: 64px; }
    .matrix-table th:not(:first-child):not(:last-child),
    .matrix-table td:not(:first-child):not(:last-child) { width: 6.5%; min-width: 52px; text-align: right; }
    .matrix-table .total-col { background: #1e3a5f !important; color: #e2e8f0; font-weight: 700; }
    .matrix-table tfoot td { background: #1e293b; color: #f1f5f9; font-weight: 700; }
    .matrix-table tfoot td:first-child { background: #0f172a; }
    .matrix-subtotal td {
      background: #f8fafc; font-weight: 600; color: #334155;
      border-top: 2px solid #e2e8f0; border-bottom: 1px solid #e2e8f0;
      font-style: italic;
    }
    .matrix-subtotal td.total-col { background: #dbeafe; color: #1e3a5f; }

    /* Detailed table: keep key columns from wrapping */
    .detail-table td:nth-child(2),
    .detail-table td:nth-child(3) { white-space: nowrap; width: 100px; }
    .detail-table td:first-child  { white-space: nowrap; min-width: 90px; }

    /* spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #cbd5e1; border-top-color: #6366f1;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile ───────────────────────────────────── */
    @media (max-width: 680px) {
      main    { padding: 1rem .6rem; }
      .card   { padding: 1rem .875rem; }
      header  { padding: .9rem 1rem; }

      /* Form: inputs em coluna única */
      .form-row    { gap: .5rem; }
      .form-group input[type="text"]   { width: 110px; }
      .form-group input[type="number"] { width: 90px; }

      /* Tabelas: fonte e padding menores */
      table { font-size: .76rem; }
      th    { padding: .45rem .5rem; }
      td    { padding: .38rem .5rem; }

      /* Linhas vazias: ocultar na tabela detalhada para reduzir scroll vertical */
      .empty-month { display: none; }

      /* ── Matriz: layout automático + sticky na 1.ª coluna (ticker) ── */
      .matrix-table {
        table-layout: auto;
        /* largura mínima para 14 colunas a ~52px cada = 728px; força scroll */
        min-width: 700px;
      }
      /* Sticky ticker column */
      .matrix-table th:first-child,
      .matrix-table td:first-child {
        position: sticky;
        left: 0;
        z-index: 2;
        width: auto;
        min-width: 90px;
        max-width: 140px;
        box-shadow: 2px 0 6px rgba(0,0,0,.08);
        /* fundo opaco para não mostrar células por baixo */
        background: #fff;
      }
      /* Sobrescrever fundo para cada tipo de linha */
      .matrix-table thead th:first-child         { background: #1e293b; }
      .matrix-table tfoot  td:first-child         { background: #0f172a; }
      .matrix-subtotal     td:first-child         { background: #f8fafc !important; }
      tr:hover td:first-child { background: #f0f9ff; }

      /* Colunas de mês: tamanho mínimo compacto */
      .matrix-table th:not(:first-child):not(:last-child),
      .matrix-table td:not(:first-child):not(:last-child) {
        width: auto; min-width: 54px;
      }
      .matrix-table th:last-child,
      .matrix-table td:last-child { width: auto; min-width: 68px; }

      /* ── Tabela detalhada: colunas de data mais compactas ── */
      .detail-table th,
      .detail-table td { padding: .38rem .4rem; }
      .detail-table td:nth-child(2),
      .detail-table td:nth-child(3) { min-width: 72px; }
      .detail-table td:first-child  { min-width: 72px; }
    }

    /* Breakpoint ainda menor (320px) */
    @media (max-width: 400px) {
      table { font-size: .72rem; }
      .matrix-table { min-width: 660px; }
    }

    /* ── Landscape mobile (telefone deitado) ──────── */
    /* Cobre iPhones e Androids típicos em landscape: ~568px–915px wide, altura < 500px */
    @media (orientation: landscape) and (max-height: 500px) {
      /* Header compacto */
      header { padding: .5rem 1rem; }
      header h1 { font-size: 1.1rem; }
      header span { display: none; }   /* esconde subtítulo para ganhar espaço */

      /* Menos padding geral */
      main  { padding: .6rem .75rem; }
      .card { padding: .75rem 1rem; margin-bottom: .75rem; }
      .card h2 { margin-bottom: .6rem; }

      /* Fonte da tabela menor */
      table { font-size: .76rem; }
      th    { padding: .4rem .55rem; }
      td    { padding: .32rem .55rem; }

      /* Meses vazios ocultos (reduz linhas na tabela detalhada) */
      .empty-month { display: none; }

      /* ── Matriz: sticky na 1.ª coluna + scroll horizontal ── */
      .matrix-table {
        table-layout: auto;
        min-width: 680px;
      }
      .matrix-table th:first-child,
      .matrix-table td:first-child {
        position: sticky;
        left: 0;
        z-index: 2;
        width: auto;
        min-width: 90px;
        max-width: 130px;
        box-shadow: 2px 0 6px rgba(0,0,0,.08);
        background: #fff;
      }
      .matrix-table thead th:first-child    { background: #1e293b; }
      .matrix-table tfoot  td:first-child   { background: #0f172a; }
      .matrix-subtotal     td:first-child   { background: #f8fafc !important; }
      tr:hover td:first-child { background: #f0f9ff; }

      .matrix-table th:not(:first-child):not(:last-child),
      .matrix-table td:not(:first-child):not(:last-child) {
        width: auto; min-width: 50px;
      }
      .matrix-table th:last-child,
      .matrix-table td:last-child { width: auto; min-width: 62px; }

      /* ── Tabela detalhada: colunas de data mais compactas ── */
      .detail-table th,
      .detail-table td { padding: .32rem .4rem; }
      .detail-table td:nth-child(2),
      .detail-table td:nth-child(3) { min-width: 70px; white-space: nowrap; }
      .detail-table td:first-child  { min-width: 68px; white-space: nowrap; }

      /* Form: linha única compacta */
      .form-row { gap: .4rem; }
      .form-group input[type="text"]   { width: 100px; }
      .form-group input[type="number"] { width: 80px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>💰 Proventos</h1>
    <span>Ações &amp; FIIs · Status Invest</span>
  </div>
  <div id="logout-btn" {% if not has_password %}style="display:none"{% endif %}>
    <a href="/logout" style="color:#9ab;font-size:0.85rem;text-decoration:none;opacity:0.8">⎋ Sair</a>
  </div>
</header>

<main>
  <!-- Form -->
  <div class="card">
    <h2>Consultar proventos</h2>

    <!-- Summary bar: visível apenas quando config carregada e painel fechado -->
    <div id="config-summary">
      <div class="summary-chips" id="summary-chips"></div>
      <button id="btn-edit-list" onclick="toggleEditor()">✏️ Editar lista</button>
    </div>

    <!-- Painel colapsável com formulário e chips -->
    <div id="ticker-editor">
      <div class="form-row">
        <div class="form-group">
          <label>Ticker</label>
          <input id="inp-ticker" type="text" placeholder="PETR4" maxlength="8" />
        </div>
        <div class="form-group">
          <label>Cotas (opcional)</label>
          <input id="inp-qtd" type="number" placeholder="ex: 200" min="1" />
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn btn-add" onclick="addTicker()">+ Adicionar</button>
        </div>
      </div>

      <div id="ticker-list"></div>

      <div style="margin-top:.5rem;font-size:.8rem;color:#64748b">
        <span class="config-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#6366f1;vertical-align:middle;margin-right:.3rem"></span>
        Marcados com ponto roxo vieram do arquivo de configuração.
      </div>
    </div>

    <div style="margin-top:1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <div class="form-group">
        <label>Ano</label>
        <select id="sel-ano"></select>
      </div>
      <div class="form-group" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <button id="btn-buscar" class="btn btn-search" onclick="buscar(false)">Consultar</button>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button id="btn-refresh" class="btn" style="background:#0f3460;color:#e0e0e0;padding:.55rem 1rem;font-size:.88rem"
                onclick="buscar(true)" title="Ignora o cache e busca dados atualizados do Status Invest">
          🔄 Forçar atualização
        </button>
      </div>
      <span id="status"></span>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────
  const ativos = [];   // [{ticker, qtd}]
  let configSource = false;  // true quando ativos vieram do arquivo de config

  // ── Init ───────────────────────────────────────────────────────────
  const anoAtual = {{ ano }};
  const sel = document.getElementById('sel-ano');
  for (let y = anoAtual; y >= anoAtual - 5; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    sel.appendChild(o);
  }

  document.getElementById('inp-ticker').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTicker();
  });
  document.getElementById('inp-qtd').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTicker();
  });

  // Carrega ativos pré-definidos do arquivo de configuração (se houver)
  let _configStatusTimer = null;
  (async () => {
    try {
      const resp = await fetch('/api/config');
      const data = await resp.json();
      if (data.ativos && data.ativos.length > 0) {
        data.ativos.forEach(a => {
          if (!ativos.find(x => x.ticker === a.ticker)) {
            ativos.push({ ticker: a.ticker, qtd: a.qtd || 0, fromConfig: true });
          }
        });
        configSource = true;
        renderChips();
        renderSummary();       // mostra barra resumida, oculta painel
      } else {
        // Sem config: abre o painel diretamente
        openEditor();
      }
    } catch (_) {
      openEditor();
    }
  })();

  // ── Ticker list ────────────────────────────────────────────────────
  function openEditor() {
    document.getElementById('ticker-editor').classList.add('open');
  }

  function toggleEditor() {
    const panel = document.getElementById('ticker-editor');
    const btn   = document.getElementById('btn-edit-list');
    const open  = panel.classList.toggle('open');
    btn.textContent = open ? '✕ Fechar' : '✏️ Editar lista';
  }

  function renderSummary() {
    const bar    = document.getElementById('config-summary');
    const chips  = document.getElementById('summary-chips');
    const editor = document.getElementById('ticker-editor');

    if (configSource && ativos.length > 0) {
      chips.innerHTML = ativos.map(a =>
        `<span class="summary-chip">${a.ticker}${a.qtd ? ` ×${a.qtd.toLocaleString('pt-BR')}` : ''}</span>`
      ).join('');
      bar.style.display = 'flex';
      editor.classList.remove('open');
      document.getElementById('btn-edit-list').textContent = '✏️ Editar lista';
    } else {
      bar.style.display = 'none';
      openEditor();
    }
  }

  function addTicker() {
    const ticker = document.getElementById('inp-ticker').value.trim().toUpperCase();
    const qtd    = parseInt(document.getElementById('inp-qtd').value) || 0;
    if (!ticker) return;
    if (ativos.find(a => a.ticker === ticker)) {
      setStatus(`${ticker} já está na lista.`); return;
    }
    ativos.push({ ticker, qtd });
    document.getElementById('inp-ticker').value = '';
    document.getElementById('inp-qtd').value    = '';
    renderChips();
    if (configSource) renderSummary();
    setStatus('');
    document.getElementById('inp-ticker').focus();
  }

  function removeTicker(ticker) {
    const i = ativos.findIndex(a => a.ticker === ticker);
    if (i >= 0) ativos.splice(i, 1);
    renderChips();
    if (configSource) renderSummary();
  }

  function renderChips() {
    const el = document.getElementById('ticker-list');
    el.innerHTML = ativos.map(a => `
      <div class="chip${a.fromConfig ? ' from-config' : ''}">
        ${a.fromConfig ? '<span class="config-dot" title="Do arquivo de configuração"></span>' : ''}
        <span class="ticker-label">${a.ticker}</span>
        ${a.qtd ? `<span class="qtd-label">×${a.qtd.toLocaleString('pt-BR')}</span>` : ''}
        <button class="btn-remove" onclick="removeTicker('${a.ticker}')" title="Remover">×</button>
      </div>
    `).join('');
  }

  // ── Search (streaming) ─────────────────────────────────────────────
  async function buscar(forceRefresh = false) {
    if (!ativos.length) { setStatus('Adicione ao menos um ticker.'); return; }

    // Cancela o timer da mensagem de config para não interferir
    if (_configStatusTimer) { clearTimeout(_configStatusTimer); _configStatusTimer = null; }

    const btnBuscar  = document.getElementById('btn-buscar');
    const btnRefresh = document.getElementById('btn-refresh');
    const total = ativos.length;
    btnBuscar.disabled  = true;
    btnRefresh.disabled = true;
    document.getElementById('results').innerHTML = '';

    const ano = parseInt(document.getElementById('sel-ano').value);

    // Acumula resultados e erros vindos do stream
    const resultados = [];
    const erros      = [];
    let   metaDone   = null;   // {ano, meses_curtos} do evento "done"

    try {
      const resp = await fetch('/api/proventos/stream', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ ativos, ano, force_refresh: forceRefresh }),
      });

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let   buf     = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        // SSE: blocos separados por \n\n
        const blocks = buf.split('\n\n');
        buf = blocks.pop();   // guarda bloco incompleto

        for (const block of blocks) {
          const line = block.trim();
          if (!line.startsWith('data: ')) continue;
          let ev;
          try { ev = JSON.parse(line.slice(6)); } catch { continue; }

          if (ev.type === 'progress') {
            setStatus(
              `<span class="spinner"></span>` +
              `${forceRefresh ? 'Atualizando' : 'Consultando'} <b>${ev.ticker}</b>` +
              (total > 1 ? ` <span style="color:#94a3b8">(${ev.index} de ${ev.total})</span>` : '') +
              `…`
            );
          } else if (ev.type === 'result') {
            resultados.push(ev.data);
          } else if (ev.type === 'error') {
            erros.push({ ticker: ev.ticker, erro: ev.erro });
          } else if (ev.type === 'done') {
            metaDone = ev;
          }
        }
      }

      setStatus('');
      renderResults({ resultados, erros, ano: metaDone?.ano ?? ano, meses_curtos: metaDone?.meses_curtos ?? [] });

    } catch (err) {
      setStatus('Erro ao conectar com o servidor.');
    } finally {
      btnBuscar.disabled  = false;
      btnRefresh.disabled = false;
    }
  }

  // ── Render ─────────────────────────────────────────────────────────
  function fmt(v, decimals = 2, currency = false) {
    if (v === null || v === undefined) return '—';
    const s = v.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    return currency ? 'R$\u00a0' + s : s;
  }

  function renderResults(data) {
    const el = document.getElementById('results');
    let html = '';

    // Errors — separar rate-limit de outros erros para dar dica mais clara
    if (data.erros?.length) {
      const rateLimitErros = data.erros.filter(e => e.erro.includes('429') || e.erro.includes('Too Many') || e.erro.includes('rate limit'));
      const outrosErros    = data.erros.filter(e => !rateLimitErros.includes(e));

      if (rateLimitErros.length) {
        html += `<div class="warn-box">
          ⏳ <b>Limite de requisições atingido (HTTP 429)</b> — o Status Invest bloqueou temporariamente o acesso.<br>
          Aguarde alguns minutos antes de tentar novamente.<br>
          ${rateLimitErros.map(e => `<div style="margin-top:.3rem">• <b>${e.ticker}</b>: ${e.erro}</div>`).join('')}
        </div>`;
      }
      if (outrosErros.length) {
        html += `<div class="error-box">`;
        outrosErros.forEach(e => html += `<div>⚠ <b>${e.ticker}</b>: ${e.erro}</div>`);
        html += `</div>`;
      }
    }

    if (!data.resultados?.length) { el.innerHTML = html; return; }

    if (data.resultados.length === 1) {
      html += renderDetalhadoFlat(data.resultados[0]);
    } else {
      html += renderMatriz(data.resultados, data.meses_curtos, data.ano);
    }

    el.innerHTML = html;
  }

  function _cacheBadge(d) {
    if (!d.fetched_at) return `<span class="cache-badge live">🟢 atualizado agora</span>`;
    const dt = new Date(d.fetched_at);
    const fmt = dt.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    return `<span class="cache-badge" title="Dados em cache desde ${fmt}">📋 ${fmt}</span>`;
  }

  function _cachesBadgeMatriz(resultados) {
    const allLive = resultados.every(d => !d.fetched_at);
    if (allLive) return `<span class="cache-badge live">🟢 atualizado agora</span>`;
    const oldest = resultados.reduce((min, d) => {
      if (!d.fetched_at) return min;
      return (!min || d.fetched_at < min) ? d.fetched_at : min;
    }, null);
    if (!oldest) return `<span class="cache-badge live">🟢 atualizado agora</span>`;
    const dt = new Date(oldest);
    const fmt = dt.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    const mixed = resultados.some(d => !d.fetched_at);
    return mixed
      ? `<span class="cache-badge" title="Alguns dados atualizados agora, outros em cache">📋 parcialmente em cache</span>`
      : `<span class="cache-badge" title="Cache mais antigo: ${fmt}">📋 cache de ${fmt}</span>`;
  }

  // ── Detailed view ──────────────────────────────────────────────────
  function renderDetalhadoFlat(d) {
    const comQtd = d.qtd > 0;
    const badgeClass = d.tipo === 'FII' ? 'badge-fii' : 'badge-acao';
    const qtdLabel = comQtd ? ` · ${d.qtd.toLocaleString('pt-BR')} cotas` : '';

    let html = `<div class="result-section card">
      <div class="result-title">
        ${d.ticker}
        <span class="badge ${badgeClass}">${d.tipo}</span>
        <span style="font-weight:400;color:#64748b;font-size:.9rem">${d.ano}${qtdLabel}</span>
        ${_cacheBadge(d)}
      </div>
      <div class="tbl-wrap"><table class="detail-table">
        <thead><tr>
          <th>Mês</th>
          <th>Pagamento</th>
          <th>Data-com</th>
          <th>Tipo</th>
          <th class="num">${comQtd ? 'R$/cota' : 'Valor (R$)'}</th>
          ${comQtd ? '<th class="num">Total (R$)</th>' : ''}
        </tr></thead>
        <tbody>`;

    d.meses.forEach(m => {
      if (!m.grupos.length) {
        html += `<tr class="empty-month">
          <td>${m.nome}</td><td colspan="3">—</td><td></td>
          ${comQtd ? '<td></td>' : ''}
        </tr>`;
        return;
      }

      let mesShown = false;
      let totalRows = m.grupos.reduce((s, g) => s + g.itens.length + (g.itens.length > 1 ? 1 : 0), 0)
                    + (m.grupos.length > 1 ? 1 : 0);

      m.grupos.forEach((g, gi) => {
        g.itens.forEach((item, ii) => {
          html += `<tr>
            ${!mesShown ? `<td rowspan="${totalRows}">${m.nome}</td>` : ''}
            ${ii === 0 ? `<td rowspan="${g.itens.length + (g.itens.length > 1 ? 1 : 0)}">${g.data_pagamento}</td>
                         <td rowspan="${g.itens.length + (g.itens.length > 1 ? 1 : 0)}">${g.data_com}</td>` : ''}
            <td>${item.tipo}</td>
            <td class="num">${fmt(item.valor, 6, true)}</td>
            ${comQtd ? `<td class="num">${fmt(item.total, 2, true)}</td>` : ''}
          </tr>`;
          mesShown = true;
        });
        if (g.itens.length > 1) {
          html += `<tr class="subtotal-row">
            <td colspan="2">Subtotal</td>
            <td class="num">${fmt(g.subtotal, 6, true)}</td>
            ${comQtd ? `<td class="num">${fmt(g.subtotal_total, 2, true)}</td>` : ''}
          </tr>`;
        }
        if (gi < m.grupos.length - 1) {
          html += `<tr><td colspan="${comQtd ? 4 : 3}" style="padding:2px;background:#f8fafc"></td></tr>`;
        }
      });

      if (m.grupos.length > 1) {
        html += `<tr class="month-total-row">
          <td colspan="3">Total ${m.nome}</td>
          <td class="num">${fmt(m.total_bruto, 6, true)}</td>
          ${comQtd ? `<td class="num">${fmt(m.total_reais, 2, true)}</td>` : ''}
        </tr>`;
      }
    });

    // Footer
    if (comQtd) {
      html += `
        <tr class="total-label-row"><td colspan="4">Total ano (por cota)</td><td class="num">${fmt(d.total_ano_bruto, 6, true)}</td><td></td></tr>
        <tr class="total-row"><td colspan="4">Total ano</td><td></td><td class="num">${fmt(d.total_ano_reais, 2, true)}</td></tr>`;
    } else {
      html += `<tr class="total-row"><td colspan="4">Total ano</td><td class="num">${fmt(d.total_ano_bruto, 6, true)}</td></tr>`;
    }

    html += `</tbody></table></div></div>`;
    return html;
  }

  // ── Matrix view ────────────────────────────────────────────────────
  function renderMatriz(resultados, mesesCurtos, ano) {
    const comQtd = resultados.some(d => d.qtd > 0);

    // Separar em grupos preservando a ordem original dentro de cada grupo
    const fiis  = resultados.filter(d => d.tipo === 'FII');
    const acoes = resultados.filter(d => d.tipo !== 'FII');
    const grupos = [];
    if (fiis.length)  grupos.push({ label: 'Sub-total FIIs',  items: fiis });
    if (acoes.length) grupos.push({ label: 'Sub-total Ações', items: acoes });
    const multiGrupo = grupos.length > 1;

    let html = `<div class="result-section card">
      <div class="result-title">
        Proventos combinados
        <span style="font-weight:400;color:#64748b;font-size:.9rem">${ano}${comQtd ? ' · valores em R$ considerando as cotas informadas' : ''}</span>
        ${_cachesBadgeMatriz(resultados)}
      </div>
      <div class="tbl-wrap"><table class="matrix-table">
        <thead><tr>
          <th>Ticker</th>
          ${mesesCurtos.map(m => `<th class="num">${m}</th>`).join('')}
          <th class="num total-col">Total</th>
        </tr></thead>
        <tbody>`;

    const totaisMes = Array(12).fill(0);
    let totalGeral = 0;

    // Helper: render one ticker row, accumulate into provided accumulators
    function renderTicker(d, acumMes, acumTotal) {
      const badgeClass = d.tipo === 'FII' ? 'badge-fii' : 'badge-acao';
      const qtdSuffix  = d.qtd ? ` <span style="color:#94a3b8;font-size:.78rem">×${d.qtd.toLocaleString('pt-BR')}</span>` : '';
      let totalTicker  = 0;
      const cells = Array.from({ length: 12 }, (_, i) => {
        const m   = i + 1;
        const raw = d.por_mes_total[m];
        const val = raw != null ? (d.qtd > 0 ? raw * d.qtd : raw) : null;
        if (val != null) { acumMes[i] += val; totaisMes[i] += val; totalTicker += val; }
        return val != null ? `<td class="num">${fmt(val, 2, true)}</td>` : `<td class="num" style="color:#cbd5e1">—</td>`;
      });
      acumTotal.v += totalTicker;
      totalGeral  += totalTicker;
      return `<tr>
        <td><span class="badge ${badgeClass}">${d.tipo}</span> ${d.ticker}${qtdSuffix}</td>
        ${cells.join('')}
        <td class="num total-col">${fmt(totalTicker, 2, true)}</td>
      </tr>`;
    }

    grupos.forEach(grupo => {
      const gMes   = Array(12).fill(0);
      const gTotal = { v: 0 };

      grupo.items.forEach(d => { html += renderTicker(d, gMes, gTotal); });

      if (multiGrupo) {
        html += `<tr class="matrix-subtotal">
          <td>${grupo.label}</td>
          ${gMes.map(v => `<td class="num">${v > 0 ? fmt(v, 2, true) : '<span style="color:#94a3b8">—</span>'}</td>`).join('')}
          <td class="num total-col">${fmt(gTotal.v, 2, true)}</td>
        </tr>`;
      }
    });

    html += `</tbody>
      <tfoot><tr>
        <td>TOTAL</td>
        ${totaisMes.map(v => `<td class="num">${v > 0 ? fmt(v, 2, true) : '<span style="color:#475569">—</span>'}</td>`).join('')}
        <td class="num">${fmt(totalGeral, 2, true)}</td>
      </tr></tfoot>
      </table></div></div>`;

    return html;
  }

  function setStatus(msg) {
    document.getElementById('status').innerHTML = msg;
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/sw.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.warn('SW falhou:', err));
    });
  }
</script>
