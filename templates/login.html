<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proventos – Login</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#16213e" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f3460;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: min(360px, 92vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
    }

    .card h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
      color: #e0e0e0;
    }

    .card p.subtitle {
      color: #9ab;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      text-align: left;
      color: #9ab;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #2a4a7f;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #4da6ff;
    }

    .erro {
      margin-top: 0.75rem;
      color: #ff6b6b;
      font-size: 0.875rem;
    }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1a4a7a; }
    button:active { background: #0d2a50; }
  </style>
</head>
<body>
  <div class="card">
    <h1>💰 Proventos</h1>
    <p class="subtitle">Digite a senha para acessar</p>
    <form method="POST">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" autofocus autocomplete="current-password" />
      {% if erro %}<p class="erro">{{ erro }}</p>{% endif %}
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
